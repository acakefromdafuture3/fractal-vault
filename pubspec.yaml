name: fractal_vault
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.0
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  google_sign_in: 6.2.1
  # 🔥 FIXED VERSIONS: These actually exist and are highly stable!
  file_picker: ^8.1.2
  open_filex: ^4.7.0
  shared_preferences: ^2.5.5
  local_auth: ^2.1.2
  shamir_secret_plg: ^0.6.0
  flutter_dotenv: ^6.0.0
  http: ^1.2.0 # Added this for your CloudDispatcher!
  crypto: ^3.0.7
  image_picker: ^1.2.1
  encrypt: ^5.0.3
  path_provider: ^2.1.5
  google_generative_ai: ^0.4.7
  screen_protector: ^1.5.1
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1 # 🔥 NEW: Added the dev dependency you need to generate the icon!

flutter:
  uses-material-design: true
  
  # 🔥 COMBINED ASSETS LIST
  assets:
    - assets/images/vault_logo.png
    - assets/images/icon_bg.png # Added the background layer
    - assets/images/icon_fg.png # Added the foreground layer
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/vault_logo.png" 
  min_sdk_android: 21
  
  # 🛡️ THE ANDROID ADAPTIVE ICON OVERRIDE:
  adaptive_icon_background: "assets/images/icon_bg.png"
  adaptive_icon_foreground: "assets/images/icon_fg.png"
  
  web:
    generate: true
    image_path: "assets/images/vault_logo.png"